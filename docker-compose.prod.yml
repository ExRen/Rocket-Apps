version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rocket_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - rocket_postgres_data:/var/lib/postgresql/data
    networks:
      - rocket_network
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: rocket_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - rocket_redis_data:/data
    networks:
      - rocket_network
    expose:
      - "6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: rocket_backend_prod
    restart: always
    env_file: ./apps/backend/.env.production
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}?schema=public"
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - rocket_network
    expose:
      - "3001"
    volumes:
      - rocket_uploads:/app/uploads

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rocket_frontend_prod
    restart: always
    networks:
      - rocket_network
    expose:
      - "80"

  nginx:
    image: nginx:1.25-alpine
    container_name: rocket_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rocket_network

networks:
  rocket_network:
    driver: bridge

volumes:
  rocket_postgres_data:
  rocket_redis_data:
  rocket_uploads:
